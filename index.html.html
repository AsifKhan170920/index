var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(row * cellSize, col * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],
      [6, 22, 38],
      [6, 24, 42],
      [6, 26, 46],
      [6, 28, 50],
      [6, 30, 54],
      [6, 32, 58],
      [6, 34, 62],
      [6, 26, 46, 66],
      [6, 26, 48, 70],

<style>
  :root{
    --blue:#1a73e8; --blue-d:#1765cc; --blue-bg:#e8f0fe;
    --ink:#202124; --ink-2:#3c4043; --muted:#5f6368;
    --bg:#ffffff; --side:#f5f6f8; --line:#e6e8eb; --line-2:#eef0f2;
    --row-hover:#f7fbff; --thead:#f8f9fa;
    --green:#188038; --red:#d93025; --amber:#e8710a;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}

  .mgr{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .biz{padding:16px 16px 14px;border-bottom:1px solid var(--line)}
  .biz .logo{max-height:32px;max-width:100%;display:block;margin-bottom:9px}
  .biz .name{font-weight:600;font-size:14px;line-height:1.25}
  .biz .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .search{margin:12px 12px 6px;position:relative}
  .search input{width:100%;padding:7px 10px 7px 30px;border:1px solid #dadce0;border-radius:6px;font-size:13px;background:#fff;outline:none}
  .search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
  .search svg{position:absolute;left:9px;top:8px;width:15px;height:15px;fill:none;stroke:#9aa0a6;stroke-width:2}
  nav{padding:6px 0;flex:1;overflow:auto}
  .navi{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--ink-2);font-size:13.5px;cursor:pointer;border-left:3px solid transparent;user-select:none}
  .navi svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7}
  .navi:hover{background:#eceef1}
  .navi.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:500}
  .navi .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-family:var(--mono)}
  .navi.active .cnt{color:var(--blue)}
  .side-foot{padding:12px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;justify-content:space-between}

  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:15px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .topbar h1{font-size:18px;font-weight:500;margin:0}
  .topbar .crumb{font-size:12px;color:var(--muted)}
  .actions{display:flex;gap:8px;flex-wrap:wrap}

  .btn{padding:7px 14px;border:1px solid #dadce0;background:#fff;color:var(--ink-2);border-radius:5px;font-size:13px;cursor:pointer;font-family:var(--ui);display:inline-flex;align-items:center;gap:7px;transition:.12s;white-space:nowrap}
  .btn:hover{background:#f5f7f9;border-color:#c9ced3}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
  .btn.primary:hover{background:var(--blue-d);border-color:var(--blue-d)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{color:var(--red);border-color:#f2c6c2}

  .content{padding:20px 24px 60px;overflow:auto}
  .link{color:var(--blue);cursor:pointer;text-decoration:none}
  .link:hover{text-decoration:underline}
  .banner{background:#fef7e0;border:1px solid #fde293;color:#7a5b00;border-radius:6px;padding:10px 13px;font-size:12.5px;margin-bottom:16px;line-height:1.5}
  .banner b{color:#5c4400}

  .tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .tbl thead th{text-align:left;font-weight:600;color:var(--muted);background:var(--thead);border-bottom:1px solid #e8eaed;padding:10px 12px;font-size:12px;white-space:nowrap}
  .tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  .tbl tbody tr:last-child td{border-bottom:0}
  .tbl tbody tr:hover{background:var(--row-hover)}
  .tbl .code{font-family:var(--mono)}
  .tbl .prod{font-weight:500}
  .rowacts{display:flex;gap:12px}
  .pill{display:inline-block;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:20px;border:1px solid #dadce0;color:var(--muted)}
  .pill.page{color:var(--blue);border-color:#b7d0f5;background:#eef4fe}
  .pill.text{color:#0f7a4a;border-color:#bfe3ce;background:#eefaf2}
  .empty{border:1px dashed #d0d4d9;border-radius:8px;padding:34px;text-align:center;color:var(--muted);background:#fafbfc}
  .empty .big{font-size:15px;color:var(--ink-2);margin-bottom:6px}

  .labeltop{margin-bottom:20px}
  .editwrap{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start}
  .fsec{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:16px}
  .fsec > h3{margin:0;padding:11px 16px;border-bottom:1px solid var(--line-2);font-size:12.5px;font-weight:600;color:var(--ink-2);background:#fbfcfd;border-radius:8px 8px 0 0}
  .fsec .body{padding:14px 16px}
  label.f{display:block;margin-bottom:13px}
  label.f:last-child{margin-bottom:0}
  label.f > span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  input[type=text],input[type=url],textarea,select{width:100%;background:#fff;border:1px solid #dadce0;color:var(--ink);border-radius:5px;padding:8px 10px;font-size:13.5px;font-family:var(--ui);outline:none;transition:border-color .12s,box-shadow .12s}
  input.mono{font-family:var(--mono)}
  textarea{resize:vertical;min-height:52px;line-height:1.4}
  input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
  .r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .hint{font-size:11.5px;color:var(--muted);margin:-4px 0 10px}

  .seg{display:inline-flex;border:1px solid #dadce0;border-radius:6px;overflow:hidden}
  .seg button{border:0;background:#fff;color:var(--muted);padding:7px 16px;font-size:12.5px;cursor:pointer;font-family:var(--ui)}
  .seg button + button{border-left:1px solid #dadce0}
  .seg button.on{background:var(--blue);color:#fff;font-weight:500}

  .spec{border:1px solid var(--line-2);border-radius:7px;margin-bottom:10px;overflow:hidden}
  .spec .sh{display:flex;align-items:center;gap:6px;padding:7px 9px;background:#f6f7f9;border-bottom:1px solid var(--line-2)}
  .spec .sh input.secttl{border:0;background:transparent;font-weight:600;font-size:12.5px;padding:3px 5px;flex:1}
  .spec .sh input.secttl:focus{background:#fff;border-radius:5px;box-shadow:none}
  .spec .sh select{width:auto;padding:4px 6px;font-size:11.5px}
  .spec .rows{padding:9px}
  .kv{display:grid;grid-template-columns:1fr 1fr 32px;gap:7px;margin-bottom:7px}
  .kv input{padding:6px 8px;font-size:12.5px}
  .icon{border:1px solid #dadce0;background:#fff;color:var(--muted);border-radius:5px;cursor:pointer;width:32px}
  .icon:hover{color:var(--red);border-color:#f2c6c2}
  .specfoot{padding:0 9px 9px}
  .secimgs{margin-top:7px;font-size:12px}

  .imgrow{display:grid;grid-template-columns:56px 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}
  .imgthumb{width:56px;height:56px;border:1px solid #e6eaee;border-radius:6px;overflow:hidden;background:#fbfcfd;display:grid;place-items:center}
  .imgthumb img{max-width:100%;max-height:100%;object-fit:contain}
  .imgurl{padding:6px 8px;font-size:12px}

  .formbar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);margin:24px -24px -60px;padding:14px 24px;display:flex;gap:10px;align-items:center}
  .formbar .spacer{flex:1}
  .saveflag{font-size:12px;color:var(--green);font-family:var(--mono);opacity:0;transition:opacity .2s}
  .saveflag.on{opacity:1}

  .rail{position:sticky;top:20px}
  .railcard{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:16px;overflow:hidden}
  .railcard > h4{margin:0;padding:10px 14px;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--line-2);background:#fbfcfd}
  .railcard .rb{padding:14px}
  .qrbig{background:#fff;border:1px solid var(--line-2);border-radius:8px;padding:12px;width:100%;display:grid;place-items:center}
  .qrbig img{width:172px;height:172px;image-rendering:pixelated}
  .cap{height:6px;border-radius:5px;background:#eef0f2;overflow:hidden;margin:10px 0 6px}
  .cap > i{display:block;height:100%;background:var(--green);transition:width .2s,background .2s}
  .capnote{font-size:11.5px;font-family:var(--mono);color:var(--muted)}
  .railnote{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}

  .labelbox{overflow:auto}
  .label{background:#fff;color:#12151a;border:1px solid #cfd4da;border-radius:4px;width:100%;padding:18px 22px;display:grid;grid-template-columns:26px 1fr 150px;gap:18px;align-items:center}
  .label .bars{display:flex;flex-direction:column;gap:3px;justify-content:center;height:100%}
  .label .bars i{display:block;width:3px;height:70px;background:#000;border-radius:1px}
  .label .data{font-family:var(--mono);min-width:0}
  .label .data .l1{font-size:26px;font-weight:700;letter-spacing:.4px;line-height:1.15;word-break:break-word}
  .label .data .l2{font-size:20px;font-weight:600;margin-top:8px;display:flex;gap:24px;flex-wrap:wrap}
  .label .sep{color:#000}
  .label .code{display:flex;flex-direction:column;align-items:center;gap:6px;border-left:1px solid #d3d8de;padding-left:14px}
  .label .code .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.8px;font-weight:700;text-align:right;align-self:stretch;text-transform:uppercase}
  .label .code .qr{width:112px;height:112px;display:grid;place-items:center}
  .label .code .qr img{width:112px;height:112px;image-rendering:pixelated}
  .label .code .short{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:1px}
  .label .barcode{grid-column:1 / -1;display:flex;justify-content:center;margin-top:2px}
  .label.no-barcode .barcode{display:none}
  .label.no-bars .bars{visibility:hidden}

  .settings{max-width:620px}

  #viewer{display:none}
  body.viewmode{background:#eef1f4}
  body.viewmode .mgr{display:none}
  body.viewmode #viewer{display:block}
  .vbar{position:sticky;top:0;background:#202124;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:11px 16px;z-index:5}
  .vbar .vb-brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:13px}
  .vbar .vb-brand img{max-height:22px}
  .vbar button{border:0;background:var(--blue);color:#fff;padding:9px 14px;border-radius:6px;font-weight:600;cursor:pointer}
  .vwrap{max-width:820px;margin:0 auto;padding:16px}

  #printRoot{display:none}
  @media print{
    body{background:#fff}
    .mgr{display:none}
    body.viewmode .vbar{display:none}
    body.viewmode .vwrap{padding:0}
    #printRoot{display:block}
    .print-label{page-break-after:always;padding:6mm}
    .print-label:last-child{page-break-after:auto}
    .label{box-shadow:none;border:1px solid #999}
  }
  @media (max-width:1000px){ .editwrap{grid-template-columns:1fr} .rail{position:static} }
  @media (max-width:760px){ .mgr{grid-template-columns:1fr} .side{position:static;height:auto} .label{grid-template-columns:1fr 120px} .label .bars{display:none} }
</style>
</head>

function datasheet(d, logo){
  var e=function(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var group = d.group || (d.line ? d.line.split(' ')[0] : (d.article||''));
  var desc = (d.subtitle||'').split(' \u00b7 ').map(e).join('<br>');
  var company = e(d.supplier||'').replace(/\n/g,'<br>');
  var h='<div class="doc"><div class="accentbar"></div><div class="pad">';
  h+='<div class="hd"><div class="l"><div class="eyebrow">Product Specification</div><h1>'+e(d.title||group||d.article||'Product')+'</h1>'+(desc?'<div class="desc">'+desc+'</div>':'')+'</div>'+
     '<div class="r">'+(logo?'<img src="'+e(logo)+'" onerror="this.style.display=\'none\'">':'')+(company?'<div class="company">'+company+'</div>':'')+'</div></div>';
  h+='<div class="metabar"><div><label>Article No.</label><b>'+e(d.article||'\u2014')+'</b></div><div><label>Date</label><b>'+e(d.docDate||'\u2014')+'</b></div><div><label>Revision</label><b>'+e(d.docRev||'\u2014')+'</b></div><div><label>Page</label><b>'+e(d.page||'1 / 1')+'</b></div></div>';
  var imgs=(d.images||[]).filter(Boolean);
  if(imgs.length) h+='<figure class="hero">'+imgs.map(function(u){return '<img src="'+e(u)+'" onerror="this.style.display=\'none\'">';}).join('')+'<figcaption>These pictures are for illustration purposes only and do not necessarily correspond to the specified products.</figcaption></figure>';
  (d.sections||[]).forEach(function(s){
    var rows=(s.rows||[]).filter(function(r){return r.k||r.v;});
    var simgs=(s.imgs||[]).filter(Boolean);
    if(!s.title && !rows.length && !simgs.length) return;
    if(s.boxed){
      h+='<section class="sec"><table class="grid">'+(s.title?'<thead><tr><th colspan="2">'+e(s.title)+'</th></tr></thead>':'')+'<tbody>'+rows.map(function(r){return '<tr><td class="k">'+e(r.k)+'</td><td class="v">'+e(r.v)+'</td></tr>';}).join('')+'</tbody></table></section>';
    } else {
      h+='<section class="sec">'+(s.title?'<h2><span class="bar"></span>'+e(s.title)+'</h2>':'')+'<table class="spec-tbl">'+rows.map(function(r){
        var p=(r.v||'').split(' \u00b7 ');
        if(p.length>1) return '<tr><td class="k">'+e(r.k)+'</td><td class="m">'+e(p[0])+'</td><td class="u">'+e(p.slice(1).join(' \u00b7 '))+'</td></tr>';
        return '<tr><td class="k">'+e(r.k)+'</td><td class="m" colspan="2">'+e(r.v)+'</td></tr>';
      }).join('')+'</table>'+(simgs.length?'<div class="secfig">'+simgs.map(function(u){return '<img src="'+e(u)+'" onerror="this.style.display=\'none\'">';}).join('')+'</div>':'')+'</section>';
    }
  });
  if(d.notes) h+='<div class="notes">'+e(d.notes)+'</div>';
  if(company) h+='<div class="ft"><div class="ftrule"></div>'+company.replace(/<br>/g,' \u00b7 ')+'</div>';
  h+='</div></div>';
  return h;
}

let products=[], settings={biz:'Top Quality Barrel Industry LLC',sub:'Label & Spec Manager',brand:'TQB · INFO',supplier:'',baseUrl:'',defMode:'page'};

try{localStorage.setItem('__t','1');localStorage.removeItem('__t');hasStorage=true;}catch(e){hasStorage=false;}
function loadStore(){if(!hasStorage)return;try{const p=localStorage.getItem(KEY);if(p)products=JSON.parse(p)||[];const s=localStorage.getItem(KEY_S);if(s)settings=Object.assign(settings,JSON.parse(s)||{});}catch(e){}}
function saveStore(){if(!hasStorage)return;try{localStorage.setItem(KEY,JSON.stringify(products));localStorage.setItem(KEY_S,JSON.stringify(settings));}catch(e){}}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';let s='';for(let i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}

function makeQR(text,px){
  const out=el('div','qr');let ok=true;
  try{const qr=qrcode(0,(text&&text.length>320)?'L':'M');qr.addData(text||' ');qr.make();const img=new Image();img.src=qr.createDataURL(6,12);img.width=px;img.height=px;out.appendChild(img);}
  catch(e){ok=false;out.innerHTML='<div style="font:11px monospace;color:#a33;text-align:center;padding:8px">Too much data<br>for one QR</div>';}
  return {node:out,ok};
}
function http(u){return /^https?:\/\//i.test(u);}
function packSections(secs,httpOnly){return (secs||[]).map(s=>({title:s.title,boxed:!!s.boxed,rows:s.rows,imgs:(s.imgs||[]).filter(u=>!httpOnly||http(u))}));}
function baseData(o){return {brand:o.brand,title:o.line||o.article,group:o.docGroup,subtitle:o.subtitle,supplier:o.supplier,article:o.article,docDate:o.docDate,docRev:o.docRev,f1:o.f1,f2:o.f2,f3:o.f3,serial:o.serial,code:o.code,notes:o.notes};}
function specDataQR(o){return Object.assign(baseData(o),{images:(o.images||[]).filter(http),sections:packSections(o.sections,true)});}
function specDataFull(o){return Object.assign(baseData(o),{images:(o.images||[]),sections:packSections(o.sections,false)});}
function qrText(o){const L=[];if(o.brand)L.push('['+o.brand+']');L.push((o.line||o.article||'PRODUCT').toUpperCase());if(o.subtitle)L.push(o.subtitle);const meta=[];if(o.article)meta.push('Art '+o.article);if(o.code)meta.push('Code '+o.code);if(o.serial)meta.push('S/N '+o.serial);if(meta.length)L.push(meta.join('  '));(o.sections||[]).forEach(s=>{if(s.title)L.push('— '+s.title+' —');(s.rows||[]).forEach(r=>{if(r.k||r.v)L.push(r.k+': '+r.v);});});if(o.notes)L.push(o.notes);return L.join('\n');}
function qrPage(o){const base=settings.baseUrl||'https://YOUR-SITE/product-qr-spec.html';return base+'#s='+LZString.compressToEncodedURIComponent(JSON.stringify(specDataQR(o)));}
function qrValue(o){return o.mode==='page'?qrPage(o):qrText(o);}

function buildLabel(o){
  const w=el('div','label'+(o.barMode==='off'?' no-barcode':'')+(o.sideBars?'':' no-bars'));
  w.appendChild(el('div','bars','<i></i><i></i><i></i>'));
  const data=el('div','data');
  data.appendChild(el('div','l1',[o.article,o.line,o.f1,o.f2,o.f3].filter(Boolean).map(esc).join('<span class="sep"> / </span>')));
  const notes=[o.noteA,o.noteB].filter(Boolean).map(esc).join('<span class="sep"> / </span>');
  if(o.serial||notes)data.appendChild(el('div','l2',(o.serial?'<span>'+esc(o.serial)+'</span>':'')+(notes?'<span>'+notes+'</span>':'')));
  w.appendChild(data);
  const code=el('div','code');code.appendChild(el('div','kicker',esc(o.brand||'')));

function collect(){
  const o=Object.assign({},draft);
  ['brand','article','line','docGroup','subtitle','supplier','docDate','docRev','f1','f2','f3','serial','noteA','noteB','code','notes'].forEach(f=>{if($(f))o[f]=$(f).value.trim();});
  o.barMode=$('barMode')?$('barMode').value:o.barMode;o.sideBars=$('sideBars')?$('sideBars').value==='yes':o.sideBars;
  o.sections=$('sections')?readSections():o.sections;o.images=$('images')?readImages():(o.images||[]);
  o.mode=draft.mode;o.id=editingId;return o;
}
function updatePreview(){
  const o=collect();
  $('preview').innerHTML='';$('preview').appendChild(buildLabel(o));
  const val=qrValue(o);$('qrbig').innerHTML='';const {ok}=(()=>{const r=makeQR(val,172);$('qrbig').appendChild(r.node);return r;})();
  const limit=o.mode==='page'?1600:700,pct=Math.min(100,Math.round(val.length/limit*100));
  $('capbar').style.width=pct+'%';$('capbar').style.background=pct<70?'var(--green)':(pct<100?'var(--amber)':'var(--red)');
  $('capnote').textContent=(!ok?'⚠ Too much for one QR — trim, or use Page mode / a shorter spec. ':'')+val.length+' chars';
  $('capnote').style.color=(!ok||pct>=100)?'var(--red)':(pct>=70?'var(--amber)':'var(--muted)');
  $('modeHint').innerHTML=o.mode==='page'?'QR opens the hosted spec sheet (this file) + compressed data — full datasheet layout, images, Save-as-PDF. Host once, unlimited products.':'QR carries the details as text — works offline, no hosting, but no images/layout. Best for a quick phone test.';
  $('testHow').innerHTML=o.mode==='page'?(settings.baseUrl?'Scan → opens your hosted spec sheet.':'⚠ Set a <b>Viewer URL</b> in Settings, then scan to open the spec sheet.'):'Scan with your phone camera — the spec appears as text instantly.';
}

function persist(){
  const o=collect();
  if(!o.article&&!o.line&&!o.subtitle&&!(o.sections&&o.sections.length))return;
  if(!o.code){o.code=genCode();if($('code'))$('code').value=o.code;}
  if(editingId){const i=products.findIndex(x=>x.id===editingId);if(i>-1)products[i]=Object.assign({id:editingId},o);}
  else{o.id='p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);products.unshift(o);editingId=o.id;draft.id=o.id;}
  saveStore();flag();$('navCount').textContent=products.length;
}
